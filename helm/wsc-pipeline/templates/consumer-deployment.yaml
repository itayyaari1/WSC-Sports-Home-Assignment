apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wsc-pipeline.fullname" . }}-consumer
  labels:
    {{- include "wsc-pipeline.labels" . | nindent 4 }}
    app.kubernetes.io/component: consumer
spec:
  replicas: {{ .Values.consumer.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "wsc-pipeline.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: consumer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "wsc-pipeline.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: consumer
    spec:
      initContainers:
        # Wait for the Kafka broker to accept connections.
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Release.Name }}-kafka 9092; do
                echo "Waiting for Kafka broker..."
                sleep 3
              done
              echo "Kafka is ready"
        # Wait for MinIO API to accept connections.
        # The minio-init Helm hook creates the bucket separately; this just
        # ensures the MinIO service itself is up before the consumer starts.
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Release.Name }}-minio 9000; do
                echo "Waiting for MinIO..."
                sleep 3
              done
              echo "MinIO is ready"
      containers:
        - name: consumer
          image: {{ .Values.consumer.image.repository }}:{{ .Values.consumer.image.tag }}
          imagePullPolicy: {{ .Values.consumer.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "wsc-pipeline.fullname" . }}-config
            - secretRef:
                name: {{ include "wsc-pipeline.fullname" . }}-secret
