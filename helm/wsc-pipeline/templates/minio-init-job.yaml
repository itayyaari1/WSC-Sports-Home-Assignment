apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "wsc-pipeline.fullname" . }}-minio-init
  labels:
    {{- include "wsc-pipeline.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio-init
  annotations:
    # Run after all chart resources are created/upgraded
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    # Auto-delete the Job pod once it succeeds so the cluster stays tidy
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "wsc-pipeline.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: minio-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-init
          image: minio/mc:latest
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "wsc-pipeline.fullname" . }}-secret
                  key: AWS_ACCESS_KEY_ID
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wsc-pipeline.fullname" . }}-secret
                  key: AWS_SECRET_ACCESS_KEY
          command: ["/bin/sh", "-c"]
          args:
            - |
              until mc alias set local {{ include "wsc-pipeline.minioEndpoint" . }} \
                    "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" 2>/dev/null; do
                echo "Waiting for MinIO to be ready..."
                sleep 5
              done
              mc mb --ignore-existing local/{{ .Values.config.s3Bucket }}
              echo "Bucket '{{ .Values.config.s3Bucket }}' is ready"
