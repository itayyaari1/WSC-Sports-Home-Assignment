apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "wsc-pipeline.fullname" . }}-producer
  labels:
    {{- include "wsc-pipeline.labels" . | nindent 4 }}
    app.kubernetes.io/component: producer
spec:
  backoffLimit: {{ .Values.producer.backoffLimit }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "wsc-pipeline.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: producer
    spec:
      restartPolicy: OnFailure
      initContainers:
        # Poll Kafka until the broker is accepting connections before scraping.
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Release.Name }}-kafka 9092; do
                echo "Waiting for Kafka broker..."
                sleep 3
              done
              echo "Kafka is ready"
      containers:
        - name: producer
          image: {{ .Values.producer.image.repository }}:{{ .Values.producer.image.tag }}
          imagePullPolicy: {{ .Values.producer.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "wsc-pipeline.fullname" . }}-config
            - secretRef:
                name: {{ include "wsc-pipeline.fullname" . }}-secret
